<head th:replace="fragments/header :: header"></head>
<nav th:replace="fragments/navbar :: navbar"></nav>

<div id="Content" class="d-flex flex-wrap w-100 p-2 overflow-auto">
    <!-- Barra de pesquisa -->

    <div class="container-fluid w-75 mb-4">

        <div class="d-flex flex-column bg-content gap-2 align-items-center justify-content-between p-2 m-2 shadow rounded-5 w-100">

            <form class="d-flex w-100 m-auto">

                <i class="fa-solid fa-magnifying-glass text-white fs-3 p-2"></i>

                <input id="searchBar"
                       class="form-control w-90 border-0 bg-transparent h-100 m-auto text-white"
                       placeholder="Pesquisar produtos...">

                <span>
                    <button type="button" class="btn">
                        <i class="fa-solid fa-circle-user fw-bold fs-3 m-1 text-white"></i>
                    </button>
                </span>

            </form>

        </div>


        <!-- Banner principal -->

        <div class="row">

            <div class="col-9">

                <img class="w-100 h-100 p-2"
                     src="img/paint.png"

            </div>

            <div class="col-3 mt-3">

                <div class="d-flex flex-column border border-dark w-100 glow-hover">

                    <img class="w-100 h-60 p-1"

                    <div class="d-flex flex-column w-100 h-40 content-center p-3 bg-DarkGray">

                        <i class="fa-solid fa-circle-user fs-1 text-white"></i>

                        <h2 class="text-start text-white">
                            RyukXT
                        </h2>

                        <h5 class="text-start text-secondary mb-4">

                        </h5>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <div class="d-flex m-auto flex-wrap w-100">

        <h3 class="text-center m-auto text-white fw-bold p-5 m-4 w-75 border-top">
            PRODUTOS EM DESTAQUE
        </h3>

        <button class="btn">
            <p class="w-100 text-end text-white fw-bold m-auto">
                Ver Mais
            </p>
        </button>


        <div class="d-flex flex-wrap content-center gap-2 w-100 p-1">

            <!-- Produtos em destaque -->

            <div class="d-flex flex-wrap content-center gap-2 w-100 p-1">

                <div class="card-produto bg-content glow-hover text-white p-2">
                    <img class="card-img" src="img/produtos/mouse.jpg" alt="Mouse Gamer">

                    <span class="text-center w-100 h-50">
            <p>Mouse Gamer RGB Logitech</p>
            <p>R$ 199,90</p>
        </span>
                </div>

                <div class="card-produto bg-content glow-hover text-white p-2">
                    <img class="card-img" src="img/produtos/teclado.jpg" alt="Teclado Mecânico">

                    <span class="text-center w-100 h-50">
            <p>Teclado Mecânico Red Switch</p>
            <p>R$ 349,90</p>
        </span>
                </div>

                <div class="card-produto bg-content glow-hover text-white p-2">
                    <img class="card-img" src="img/produtos/headset.jpg" alt="Headset">

                    <span class="text-center w-100 h-50">
            <p>Headset HyperX Cloud II</p>
            <p>R$ 499,90</p>
        </span>
                </div>

                <div class="card-produto bg-content glow-hover text-white p-2">
                    <img class="card-img" src="img/produtos/monitor.jpg" alt="Monitor">

                    <span class="text-center w-100 h-50">
            <p>Monitor Gamer 27"</p>
            <p>R$ 1.299,90</p>
        </span>
                </div>

                <div class="card-produto bg-content glow-hover text-white p-2">
                    <img class="card-img" src="img/produtos/cadeira.jpg" alt="Cadeira Gamer">

                    <span class="text-center w-100 h-50">
            <p>Cadeira Gamer Premium</p>
            <p>R$ 899,90</p>
        </span>
                </div>

                <div class="card-produto bg-content glow-hover text-white p-2">
                    <img class="card-img" src="img/produtos/placa.jpg" alt="Placa de Vídeo">

                    <span class="text-center w-100 h-50">
            <p>RTX 5070 12GB</p>
            <p>R$ 4.599,90</p>
        </span>
                </div>

            </div>

        </div>
